name: Deploy

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  WASM_TARGET: wasm32v1-none

jobs:
  # ── Deploy Soroban contracts to testnet ──────────────────────────────────────
  deploy-contract:
    name: Deploy Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.WASM_TARGET }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build contract WASMs
        run: cargo build --workspace --target ${{ env.WASM_TARGET }} --release

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Deploy Router contract
        run: |
          stellar contract deploy \
            --wasm target/${{ env.WASM_TARGET }}/release/stellar_swap_router.wasm \
            --source ${{ secrets.STELLAR_SECRET_KEY }} \
            --network testnet

      - name: Deploy Factory contract
        run: |
          stellar contract deploy \
            --wasm target/${{ env.WASM_TARGET }}/release/stellar_swap_factory.wasm \
            --source ${{ secrets.STELLAR_SECRET_KEY }} \
            --network testnet

  # ── Deploy frontend to Vercel ────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [deploy-contract]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_CONTRACT_ID }}
          NEXT_PUBLIC_SOROBAN_RPC_URL: ${{ secrets.NEXT_PUBLIC_SOROBAN_RPC_URL }}
          NEXT_PUBLIC_NETWORK_PASSPHRASE: ${{ secrets.NEXT_PUBLIC_NETWORK_PASSPHRASE }}
          NEXT_PUBLIC_NETWORK: testnet

      - name: Deploy to Vercel
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
